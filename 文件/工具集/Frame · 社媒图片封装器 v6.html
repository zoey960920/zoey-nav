<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0c0b;--s1:#181715;--s2:#212019;--s3:#2b2926;
  --b0:rgba(255,255,255,.05);--b1:rgba(255,255,255,.09);--b2:rgba(255,255,255,.15);

  --green:#5cb85c;--red:#e05c5c;--lw:310px;--hh:46px
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t0);
  font-family:'DM Sans','PingFang SC',sans-serif;font-size:13px;line-height:1.5}

/* ─── SHELL ─── */
.app{display:grid;height:100vh;grid-template-rows:var(--hh) 1fr;grid-template-columns:var(--lw) 1px 1fr}
header{grid-column:1/-1;border-bottom:1px solid var(--b0);display:flex;align-items:center;
  padding:0 18px;gap:10px;background:rgba(13,12,11,.85);backdrop-filter:blur(12px);position:relative;z-index:10}
.logo{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;letter-spacing:-.01em}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);flex-shrink:0}
.logo-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:.08em}
.hdr-r{margin-left:auto;display:flex;gap:8px}
.chip{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:20px;
  background:var(--s2);border:1px solid var(--b0);color:var(--t2);white-space:nowrap}
.chip b{color:var(--ac);font-weight:400}

.v-sep{background:var(--b0);grid-row:2}
.left{grid-row:2;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:10px;
  padding:14px 12px;scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
.right{grid-row:2;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:14px;
  padding:18px 22px;scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

/* ─── ATOMS ─── */
.sec{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t2);padding:0 2px}
kbd{display:inline-block;padding:1px 4px;font-size:9px;background:var(--s3);border:1px solid var(--b1);border-radius:3px;color:var(--t1)}

.btn{padding:7px 16px;border-radius:8px;border:none;font-size:12px;font-family:'DM Sans',inherit;
  cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-gold{background:var(--ac);color:#1a1408;font-weight:500}.btn-gold:hover{opacity:.82}
.btn-ghost{background:var(--s2);color:var(--t1);border:1px solid var(--b0)}.btn-ghost:hover{background:var(--s3);color:var(--t0)}

/* ─── UPLOAD ─── */
.uz{border:1.5px dashed var(--b1);border-radius:10px;padding:22px 14px;text-align:center;

.uz:hover,.uz.over{border-color:var(--ac);background:var(--acd)}
.uz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* ─── FOLDER ─── */
.fb{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--s1);border-radius:8px;border:1px solid var(--b0)}

.fb-t.set{color:var(--ac)}

/* ─── QUEUE ─── */
.queue{display:flex;flex-direction:column;gap:3px}
.qe{font-size:10px;color:var(--t3);text-align:center;padding:10px 0;font-family:'DM Mono',monospace}

  transition:color .15s,background .15s;flex-shrink:0}
.qi-d:hover{background:rgba(224,92,92,.14);color:var(--red)}

/* ─── SETTINGS ─── */
.sc{background:var(--s1);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:11px}
.ct{display:flex;align-items:center;gap:8px}
.ct-l{font-size:10px;color:var(--t1);white-space:nowrap;min-width:56px;font-family:'DM Mono',monospace}

input[type="range"]{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--s3);outline:none;cursor:pointer}

/* ─── PREVIEW ─── */
.pa{background:var(--s1);border-radius:12px;padding:16px;display:flex;flex-direction:column;
  align-items:center;min-height:200px;border:1px solid var(--b0)}
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;color:var(--t3);padding:50px 20px;font-size:11px;font-family:'DM Mono',monospace}
.ph-i{font-size:28px;opacity:.3}
#cvs{max-width:100%;border-radius:3px;display:none}
.ar{display:flex;gap:7px;flex-wrap:wrap}

/* ─── BATCH ─── */
.bw{display:none;flex-direction:column;gap:5px}
.bm{font-size:10px;color:var(--t1);font-family:'DM Mono',monospace}
.bt{height:2px;background:var(--s3);border-radius:2px;overflow:hidden}
.bf{height:100%;background:var(--ac);border-radius:2px;width:0%;transition:width .3s ease}

/* ─── WARNING ─── */
.warn{display:none;padding:8px 12px;background:rgba(201,168,76,.07);
  border:1px solid rgba(201,168,76,.2);border-radius:8px;font-size:11px;color:#b8982e;line-height:1.6}

/* ─── HISTORY ─── */
.hh{display:flex;align-items:center;justify-content:space-between}
.hg{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px}
.he{font-size:10px;color:var(--t3);text-align:center;padding:20px 0;font-family:'DM Mono',monospace;grid-column:1/-1}
.hc{background:var(--s1);border-radius:8px;overflow:hidden;border:1px solid var(--b0);
  transition:border-color .15s,transform .15s;cursor:pointer}
.hc:hover{border-color:var(--b1);transform:translateY(-2px)}
.ht{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--s2)}
.hm{padding:5px 7px}
.hn{font-size:9px;color:var(--t2);font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.hdl{width:100%;padding:3px;background:var(--s2);border:none;border-radius:4px;font-size:9px;
  color:var(--t1);cursor:pointer;font-family:inherit;transition:background .1s,color .1s}
.hdl:hover{background:var(--acd);color:var(--ac)}

/* ─── FX ─── */
.pf{position:fixed;inset:0;pointer-events:none;background:rgba(201,168,76,.04);animation:pfa .4s ease forwards;z-index:999}
@keyframes pfa{from{opacity:1}to{opacity:0}}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.left>*{animation:fu .4s ease both}
.left>*:nth-child(1){animation-delay:.05s}.left>*:nth-child(2){animation-delay:.1s}
.left>*:nth-child(3){animation-delay:.15s}.left>*:nth-child(4){animation-delay:.2s}
.left>*:nth-child(5){animation-delay:.25s}

<script>
// ════════════════════════════════════════════════
// PERSISTENCE LAYER
// ════════════════════════════════════════════════
const LS_CFG='frame-cfg',LS_HIST='frame-hist';
const DB_NAME='frame-db',DB_VER=1;

function openDB(){
  return new Promise((ok,fail)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=()=>r.result.createObjectStore('kv');
    r.onsuccess=()=>ok(r.result);r.onerror=()=>fail(r.error);
  });
}
async function idbGet(k){
  try{const db=await openDB();return new Promise(r=>{
    const tx=db.transaction('kv','readonly');const rq=tx.objectStore('kv').get(k);
    rq.onsuccess=()=>r(rq.result||null);rq.onerror=()=>r(null);});}
  catch(e){return null;}
}
async function idbPut(k,v){
  try{const db=await openDB();const tx=db.transaction('kv','readwrite');
    tx.objectStore('kv').put(v,k);return new Promise(r=>{tx.oncomplete=r;});}
  catch(e){}
}

const CFG_VER=6;
function saveCfg(){try{localStorage.setItem(LS_CFG,JSON.stringify({...S.cfg,_v:CFG_VER}));}catch(e){}}
function loadCfg(){try{const d=JSON.parse(localStorage.getItem(LS_CFG));if(d&&d._v===CFG_VER){delete d._v;Object.assign(S.cfg,d);}else{localStorage.removeItem(LS_CFG);}}catch(e){localStorage.removeItem(LS_CFG);}}
function saveHist(){
  // Keep only last 30, with small thumbnails
  try{const slim=S.hist.slice(0,30).map(h=>({name:h.name,thumb:h.thumb,date:h.date}));
    localStorage.setItem(LS_HIST,JSON.stringify(slim));}catch(e){}
}
function loadHist(){try{const d=JSON.parse(localStorage.getItem(LS_HIST));if(d&&Array.isArray(d))S.hist=d;}catch(e){}}

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
const S={
  queue:[],activeId:null,nid:1,
  cfg:{pad:84,blur:36,bg:'#f7f7f7',imgR:24,outR:0,cap:''},
  hist:[],dir:null,verMap:{}
};

// ════════════════════════════════════════════════
// CANVAS ENGINE
// ════════════════════════════════════════════════
// 圆角路径（arc 方式，最高兼容性）
function rrp(c,x,y,w,h,r){
  const rv=Math.min(r,w/2,h/2);
  c.beginPath();
  if(rv<=0){c.rect(x,y,w,h);return;}
  c.moveTo(x+rv,y);
  c.arcTo(x+w,y,x+w,y+h,rv);
  c.arcTo(x+w,y+h,x,y+h,rv);
  c.arcTo(x,y+h,x,y,rv);
  c.arcTo(x,y,x+w,y,rv);
  c.closePath();
}
function isDk(hex){const h=hex.replace('#','');
  return(.299*parseInt(h.slice(0,2),16)+.587*parseInt(h.slice(2,4),16)+.114*parseInt(h.slice(4,6),16))<128;}
function scaleR(v,w,h){return Math.round(v*Math.max(1,Math.max(w,h)/600));}

// ═══ 核心渲染：全部在主画布完成，零 offscreen canvas ═══
function renderFrame(tc,imgs,cfg,sc){
  sc=sc||2;
  const{pad,blur,bg,imgR,outR,cap}=cfg;
  let iW,iH;
  // 尺寸（暂只处理单图，双图走旧逻辑）
  iW=imgs[0].naturalWidth;iH=imgs[0].naturalHeight;

  const realImgR=scaleR(imgR,iW,iH);
  const realOutR=scaleR(outR,iW,iH);
  const realPad=Math.round(pad*Math.max(1,Math.max(iW,iH)/1600));
  const realBlur=Math.round(blur*Math.max(1,Math.max(iW,iH)/1400));

  const capFs=cap?Math.max(13,Math.round(iW*.018)):0;
  const capH=cap?Math.round(capFs*1.8):Math.round(iH*.006);
  const TW=iW+realPad*2,TH=iH+realPad*2+capH;
  tc.canvas.width=TW*sc;tc.canvas.height=TH*sc;
  tc.scale(sc,sc);

  // ① 背景
  tc.fillStyle=bg;tc.fillRect(0,0,TW,TH);

  // ② 外框圆角
  if(realOutR>0){
    tc.globalCompositeOperation='destination-in';
    rrp(tc,0,0,TW,TH,realOutR);tc.fill();
    tc.globalCompositeOperation='source-over';
  }

  // ③ 唯一图层：offscreen canvas 上用 destination-in 做圆角遮罩
  const off=document.createElement('canvas');off.width=iW;off.height=iH;
  const oc=off.getContext('2d');
  oc.drawImage(imgs[0],0,0,iW,iH);
  if(realImgR>0){
    // destination-in：保留原图与遮罩重叠部分，遮罩外变透明
    oc.globalCompositeOperation='destination-in';
    rrp(oc,0,0,iW,iH,realImgR);
    oc.fill();
    oc.globalCompositeOperation='source-over';
    // 验证：左上角(2,2)应为透明
    const px=oc.getImageData(2,2,1,1).data;
    console.log(`[Frame v6] img=${iW}x${iH} R=${realImgR} corner_alpha=${px[3]} ${px[3]===0?'✅圆角OK':'⚠️圆角异常'}`);
  } else {
    console.log(`[Frame v6] img=${iW}x${iH} R=0 (无圆角)`);
  }

  // 带投影画到主画布：shadow 跟随位图 alpha 轮廓
  const dk=isDk(bg),al=dk?.46:.14;
  tc.save();
  tc.shadowColor=dk?`rgba(255,255,255,${al})`:`rgba(0,0,0,${al})`;
  tc.shadowBlur=realBlur;tc.shadowOffsetX=0;tc.shadowOffsetY=Math.round(realBlur*.25);
  tc.drawImage(off,realPad,realPad);
  tc.restore();

  // ⑤ 注释文字
  if(cap){
    tc.font=`300 ${capFs}px system-ui,-apple-system,"PingFang SC","Noto Sans SC","Helvetica Neue",sans-serif`;
    tc.fillStyle=dk?'rgba(255,255,255,.38)':'rgba(0,0,0,.34)';
    tc.textAlign='center';tc.textBaseline='top';
    tc.fillText(cap,TW/2,realPad+iH+Math.round(capFs*.6));
  }
  tc.setTransform(1,0,0,1,0,0);
}

// ════════════════════════════════════════════════
// FILE LOADING
// ════════════════════════════════════════════════
function loadFiles(raw){
  Array.from(raw).filter(Boolean).forEach(f=>{
    const id=S.nid++;
    S.queue.push({id,img:null,name:f.name||'',status:'loading'});
    const img=new Image();
    img.onload=()=>{
      const it=S.queue.find(q=>q.id===id);
      if(it){it.img=img;it.status='pending';}
      if(!S.activeId)activate(id);
      renderQ();stats();
    };
    img.onerror=()=>{const it=S.queue.find(q=>q.id===id);if(it)it.status='error';renderQ();};
    img.src=URL.createObjectURL(f instanceof File?f:f);
  });
  renderQ();stats();
}

// ════════════════════════════════════════════════
// QUEUE UI
// ════════════════════════════════════════════════
function renderQ(){
  const el=document.getElementById('Q');
  if(!S.queue.length){el.innerHTML='<div class="qe">— 暂无图片 —</div>';return;}
  el.innerHTML='';
  S.queue.forEach(it=>{
    const d=document.createElement('div');
    d.className='qi'+(it.id===S.activeId?' act':'');
    const bn=it.name.replace(/\.[^.]+$/,'')||`截图 ${it.id}`;
    const sl={loading:'加载中…',pending:'待处理',done:'✓ 已完成',error:'! 错误'}[it.status]||'';
    const sc=it.status==='done'?' done':it.status==='error'?' err':'';
    d.innerHTML=`<img class="qi-th" src="${it.img?it.img.src:''}"/>
      <div class="qi-inf"><div class="qi-n" title="${it.name}">${bn}</div><div class="qi-s${sc}">${sl}</div></div>
      <button class="qi-d" title="移除">×</button>`;
    d.querySelector('.qi-d').addEventListener('click',e=>{e.stopPropagation();removeQ(it.id);});
    d.addEventListener('click',()=>activate(it.id));
    el.appendChild(d);
  });
}
function removeQ(id){S.queue=S.queue.filter(q=>q.id!==id);
  if(S.activeId===id){S.activeId=S.queue.length?S.queue[0].id:null;S.activeId?renderPrev():clearPrev();}
  renderQ();stats();}
function activate(id){S.activeId=id;renderPrev();renderQ();}

// ════════════════════════════════════════════════
// PREVIEW
// ════════════════════════════════════════════════
const cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');
const pH=document.getElementById('pH'),wB=document.getElementById('wB');

function renderPrev(){
  const it=S.queue.find(q=>q.id===S.activeId);
  if(!it||!it.img){clearPrev();return;}
  wB.style.display='none';
  const img=it.img;
  if(img.naturalHeight>img.naturalWidth&&img.naturalHeight/img.naturalWidth>4/3){
    wB.innerHTML=`⚠️ 竖图（${img.naturalWidth}×${img.naturalHeight}）— 建议裁为横图，或上传第二张做左右拼接`;
    wB.style.display='block';
  }
  pH.style.display='none';cvs.style.display='block';
  document.getElementById('aR').style.display='flex';
  renderFrame(ctx,[img],S.cfg);
  cvs.style.width=Math.min(cvs.width/2,720)+'px';cvs.style.height='auto';
}
function clearPrev(){pH.style.display='flex';cvs.style.display='none';
  document.getElementById('aR').style.display='none';wB.style.display='none';}

// ════════════════════════════════════════════════
// NAMING
// ════════════════════════════════════════════════
function mkName(src){
  const n=new Date();
  const d=`${String(n.getFullYear()).slice(-2)}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}`;
  const hm=`${String(n.getHours()).padStart(2,'0')}-${String(n.getMinutes()).padStart(2,'0')}`;
  const base=(src||'').replace(/\.[^.]+$/,'').trim()||hm;
  S.verMap[base]=(S.verMap[base]||0)+1;
  const v=`1.${S.verMap[base]-1}`;
  return`${d}-${base}-${v}.png`;
}

// ════════════════════════════════════════════════
// SAVE
// ════════════════════════════════════════════════
async function doSave(c,name){
  const blob=await new Promise(r=>c.toBlob(r,'image/png'));
  if(S.dir){try{const fh=await S.dir.getFileHandle(name,{create:true});
    const w=await fh.createWritable();await w.write(blob);await w.close();return;}catch(e){console.warn(e);}}
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),2000);
}

function mkThumb(c){
  // 生成 120px 宽小缩略图
  const t=document.createElement('canvas');
  const tw=120,th=Math.round(120*(c.height/c.width));
  t.width=tw;t.height=th;t.getContext('2d').drawImage(c,0,0,tw,th);
  return t.toDataURL('image/jpeg',.4);
}

function addHist(name,c){
  S.hist.unshift({name,thumb:mkThumb(c),date:Date.now(),data:c.toDataURL('image/png')});
  if(S.hist.length>30)S.hist.length=30;
  renderHist();stats();saveHist();
}

function renderHist(){
  const g=document.getElementById('hG'),h=document.getElementById('hH');
  if(!S.hist.length){g.innerHTML='<div class="he">导出后自动归档到这里</div>';h.style.display='none';return;}
  h.style.display='flex';
  g.innerHTML=S.hist.map((it,i)=>`<div class="hc">
    <img class="ht" src="${it.thumb}"/><div class="hm">
    <div class="hn" title="${it.name}">${it.name}</div>
    <button class="hdl" onclick="dlH(${i})">⬇ 下载</button></div></div>`).join('');
}
window.dlH=function(i){const it=S.hist[i];if(!it)return;
  const a=document.createElement('a');a.href=it.data;a.download=it.name;a.click();};
function stats(){document.getElementById('sQ').textContent=S.queue.length;document.getElementById('sE').textContent=S.hist.length;}

// ════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════
document.getElementById('svB').addEventListener('click',async()=>{
  const it=S.queue.find(q=>q.id===S.activeId);if(!it||!it.img)return;
  const name=mkName(it.name);await doSave(cvs,name);
  it.status='done';renderQ();addHist(name,cvs);
});

document.getElementById('baB').addEventListener('click',async()=>{
  const pending=S.queue.filter(q=>q.img&&q.status!=='done');if(!pending.length)return;
  const bw=document.getElementById('bW'),bm=document.getElementById('bM'),bf=document.getElementById('bF');
  bw.style.display='flex';
  for(let i=0;i<pending.length;i++){
    bm.textContent=`处理 ${i+1}/${pending.length} · ${pending[i].name||'图片'}`;
    bf.style.width=`${Math.round(i/pending.length*100)}%`;
    const tc=document.createElement('canvas');
    renderFrame(tc.getContext('2d'),[pending[i].img],S.cfg);
    const name=mkName(pending[i].name);await doSave(tc,name);
    pending[i].status='done';addHist(name,tc);renderQ();
    await new Promise(r=>setTimeout(r,20));
  }
  bf.style.width='100%';bm.textContent=`✓ 完成 ${pending.length} 张`;
  setTimeout(()=>{bw.style.display='none';bf.style.width='0%';},3500);
});

document.getElementById('rsB').addEventListener('click',()=>{
  S.queue=[];S.activeId=null;S.verMap={};document.getElementById('fI').value='';
  clearPrev();renderQ();stats();
});
document.getElementById('clH').addEventListener('click',()=>{S.hist=[];renderHist();stats();saveHist();});

// ════════════════════════════════════════════════
// FOLDER (IndexedDB 持久化)
// ════════════════════════════════════════════════
function updateFolderUI(name){
  const t=document.getElementById('fT');t.textContent=`📁 ${name}`;t.classList.add('set');
  document.getElementById('fB').textContent='更换';
}

document.getElementById('fB').addEventListener('click',async()=>{
  if(!window.showDirectoryPicker){alert('需要 Chrome/Edge 支持文件夹 API');return;}
  try{S.dir=await window.showDirectoryPicker({mode:'readwrite'});
    updateFolderUI(S.dir.name);await idbPut('dirHandle',S.dir);
  }catch(e){}
});

async function restoreDir(){
  const handle=await idbGet('dirHandle');if(!handle)return;
  try{
    let perm=await handle.queryPermission({mode:'readwrite'});
    if(perm==='granted'){S.dir=handle;updateFolderUI(handle.name);return;}
    perm=await handle.requestPermission({mode:'readwrite'});
    if(perm==='granted'){S.dir=handle;updateFolderUI(handle.name);}
  }catch(e){}
}

// ════════════════════════════════════════════════
// CONTROLS
// ════════════════════════════════════════════════
function bindR(id,key,vid){
  document.getElementById(id).addEventListener('input',e=>{
    S.cfg[key]=+e.target.value;document.getElementById(vid).textContent=e.target.value;
    saveCfg();renderPrev();
  });
}
bindR('rP','pad','vP');bindR('rS','blur','vS');bindR('rI','imgR','vI');bindR('rO','outR','vO');
document.getElementById('cap').addEventListener('input',e=>{S.cfg.cap=e.target.value;saveCfg();renderPrev();});
document.getElementById('cO').addEventListener('click',e=>{
  const cc=e.target.closest('.cc');if(!cc)return;
  document.querySelectorAll('.cc').forEach(c=>c.classList.remove('act'));
  cc.classList.add('act');S.cfg.bg=cc.dataset.c;saveCfg();renderPrev();
});

// ════════════════════════════════════════════════
// UPLOAD / DRAG / PASTE
// ════════════════════════════════════════════════
const uz=document.getElementById('upZ'),fI=document.getElementById('fI');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('over');});
uz.addEventListener('dragleave',()=>uz.classList.remove('over'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('over');loadFiles(e.dataTransfer.files);});
fI.addEventListener('change',()=>loadFiles(fI.files));
document.body.addEventListener('dragover',e=>e.preventDefault());
document.body.addEventListener('drop',e=>{e.preventDefault();
  const imgs=Array.from(e.dataTransfer.files||[]).filter(f=>f.type.startsWith('image/'));
  if(imgs.length)loadFiles(imgs);});

document.addEventListener('paste',e=>{
  if(document.activeElement===document.getElementById('cap'))return;
  const items=(e.clipboardData||e.originalEvent?.clipboardData)?.items;if(!items)return;
  const imgs=Array.from(items).filter(i=>i.type.startsWith('image/'));if(!imgs.length)return;
  e.preventDefault();
  const f=document.createElement('div');f.className='pf';document.body.appendChild(f);setTimeout(()=>f.remove(),500);
  loadFiles(imgs.map(i=>i.getAsFile()));
});

// ════════════════════════════════════════════════
// INIT — 恢复持久化数据
// ════════════════════════════════════════════════
(async function init(){
  loadCfg();loadHist();
  // 恢复 UI 到 cfg 值
  document.getElementById('rP').value=S.cfg.pad;document.getElementById('vP').textContent=S.cfg.pad;
  document.getElementById('rS').value=S.cfg.blur;document.getElementById('vS').textContent=S.cfg.blur;
  document.getElementById('rI').value=S.cfg.imgR;document.getElementById('vI').textContent=S.cfg.imgR;
  document.getElementById('rO').value=S.cfg.outR;document.getElementById('vO').textContent=S.cfg.outR;
  document.getElementById('cap').value=S.cfg.cap||'';
  // 恢复颜色选择
  document.querySelectorAll('.cc').forEach(c=>{
    c.classList.toggle('act',c.dataset.c===S.cfg.bg);
  });
  renderHist();stats();
  await restoreDir();
})();
</script>
